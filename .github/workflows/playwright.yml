name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # ⚡ Added caching to significantly speed up build times

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Playwright Browsers
        # 🔧 Replaced the external Maven command with your native Gradle task
        run: ./gradlew playwrightInstall

      - name: Run Tests
        run: ./gradlew test --continue

      - name: Upload Playwright Traces
        # 📦 Captures the trace zip files so you can download them directly from the GitHub UI if a test fails
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: build/playwright-traces/
          retention-days: 7

      - name: Prepare gh-pages directory
        if: always()
        run: |
          rm -rf gh-pages || true
          mkdir -p gh-pages

      - name: Load Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Ensure Required Directories Exist
        if: always()
        run: |
          mkdir -p build/allure-results
          mkdir -p gh-pages

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: build/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          allow_empty_commit: true